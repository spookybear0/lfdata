name: Build and Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-native:
    name: Build Native ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: lfdata-windows-x64
            bin_name: lfdata.exe
          - os: ubuntu-latest
            artifact_name: lfdata-linux-x64
            bin_name: lfdata
          - os: macos-13
            artifact_name: lfdata-macos-x64
            bin_name: lfdata
          - os: macos-14
            artifact_name: lfdata-macos-arm64
            bin_name: lfdata

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install .[dev]
          pip install pyinstaller

      - name: Set up FFmpeg (Windows & Linux)
        if: runner.os != 'macOS'
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          export HOMEBREW_NO_AUTO_UPDATE=1
          brew install ffmpeg

      - name: Run tests
        run: |
          pytest

      - name: Build binary with PyInstaller
        run: |
          pyinstaller --name lfdata --onefile src/lfdata/__main__.py

      - name: Prepare distribution directory
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.artifact_name }}
          cp dist/${{ matrix.bin_name }} dist/${{ matrix.artifact_name }}/
          cp -r fonts dist/${{ matrix.artifact_name }}/
          cp -r assets dist/${{ matrix.artifact_name }}/

      - name: Package Windows artifact
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path ${{ matrix.artifact_name }} -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Package Unix artifact
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cd dist
          tar -czf ${{ matrix.artifact_name }}.tar.gz ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.zip
            dist/*.tar.gz

  build-linux-arm64:
    name: Build Linux arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build ARM64 Linux binary via QEMU
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu_latest
          run: |
            apt-get update && apt-get install -y python3 python3-pip python3-venv zip build-essential python3-dev libjpeg-dev zlib1g-dev
            python3 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            pip install .
            pip install pyinstaller
            pyinstaller --name lfdata --onefile src/lfdata/__main__.py
            mkdir -p dist/lfdata-linux-arm64
            cp dist/lfdata dist/lfdata-linux-arm64/
            cp -r fonts dist/lfdata-linux-arm64/
            cp -r assets dist/lfdata-linux-arm64/
            cd dist
            tar -czf lfdata-linux-arm64.tar.gz lfdata-linux-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lfdata-linux-arm64
          path: |
            dist/*.tar.gz

  release:
    name: Create GitHub Release
    needs: [build-native, build-linux-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
